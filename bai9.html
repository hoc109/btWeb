<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinh tuoi</title>
</head>
<body>
    <script>
        let d= new Date();
        let NamHienTai=d.getFullYear();
        let NamSinh;
        do {
            NamSinh= Number(prompt('Nam sinh cua ban la:'));
            if(NamSinh>NamHienTai){
                alert('Nam sinh khong hop le, vui long nhap lai');
            }
        } while(NamSinh>NamHienTai);
        let tuoi=NamHienTai-NamSinh;
        alert('Tuoi cua ban la: '+tuoi);
    </script>
</body>
</html>
