<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }

        form {
            margin-bottom: 20px;
        }

        input[type="text"] {
            margin-bottom: 10px;
            padding: 5px;
        }

        input[type="submit"] {
            padding: 5px 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h2>Kiểm tra dữ liệu Form bằng JS</h2>

    <form onsubmit="return validate()" method="post">
        <label for="num1">Nhập số:</label>
        <input type="text" name="num1" id="num1" />
        <br />
        <label for="num2">Lặp lại:</label>
        <input type="text" name="num2" id="num2" />
        <br />
        <input type="submit" value="Submit" />
    </form>

    <script>
        function validate() {
            var n1 = document.getElementById("num1");
            var n2 = document.getElementById("num2");

            if (n1.value != "" && n2.value != "") {
                if (n1.value == n2.value) {
                    alert("Hợp lệ! Bắt đầu submit form.");
                    return true;
                }
            }
            alert("Dữ liệu không được để trống và phải giống nhau!");
            return false;
        }
    </script>

</body>

</html>
