<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 5: Radio Button</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            line-height: 1.6;
        }

        button {
            margin-top: 15px;
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background-color: #007B9E;
        }

        #coKemDaChon {
            color: #d93025;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h3>Bài 5: Radio button</h3>

    <input type="radio" value="Lớn" name="co" checked />Lớn<br />
    <input type="radio" value="Vừa" name="co" />Vừa<br />
    <input type="radio" value="Nhỏ" name="co" />Nhỏ<br />

    <button onclick="chonco()">Chọn cỡ</button>
    <hr>

    <h4 id="coKemDaChon"></h4>

    <script>
        function chonco() {
            let size = "";
            let arr = document.getElementsByName("co");
            for (let i = 0; i < arr.length; i++) {
                if (arr[i].checked) {
                    size = arr[i].value;
                }
            } 
            let str = "Kích thước bạn đã chọn là: " + size;
            document.getElementById("coKemDaChon").innerHTML = str;
        }
    </script>

</body>

</html>
